<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>물류 계산기 · 메뉴</title>
<style>
  :root{
    --bg:#ffffff; --panel:#f6f9fd; --line:#d7e1f0;
    --navy:#15305c; --navy2:#1e4079; --navy-deep:#0e2144;
    --text:#1c2a45; --muted:#63728c; --accent:#c0475a; --accent-soft:#faedef;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font-family:"Segoe UI","Malgun Gothic",sans-serif;
    background:var(--bg);color:var(--text);line-height:1.5;
    display:flex;flex-direction:column}
  header{padding:26px 24px;background:linear-gradient(100deg,var(--navy-deep),var(--navy2));color:#fff;text-align:center}
  header h1{margin:0;font-size:24px;letter-spacing:.2px}
  header p{margin:8px 0 0;font-size:14px;opacity:.9}
  main{flex:1;max-width:960px;margin:0 auto;padding:34px 20px;width:100%}
  .menu{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:720px){.menu{grid-template-columns:1fr}}
  a.tile{display:block;text-decoration:none;color:inherit;background:var(--panel);
    border:1px solid var(--line);border-radius:16px;padding:26px;transition:.18s;position:relative;overflow:hidden}
  a.tile::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--accent)}
  a.tile:hover{transform:translateY(-3px);border-color:var(--accent);
    box-shadow:0 12px 30px rgba(14,33,68,.12)}
  .tile .ico{font-size:38px}
  .tile h2{margin:12px 0 6px;font-size:20px;color:var(--navy)}
  .tile p{margin:0;font-size:13.5px;color:var(--muted)}
  .tile .go{margin-top:16px;display:inline-flex;align-items:center;gap:6px;
    font-size:13px;font-weight:800;color:var(--accent)}
  footer{text-align:center;font-size:12px;color:var(--muted);padding:18px}
</style>
</head>
<body>
<header>
  <h1>📦 물류 계산기</h1>
  <p>필요한 계산기를 선택하세요</p>
</header>
<main>
  <div class="menu">
    <a class="tile" href="clp.html">
      <div class="ico">🧱</div>
      <h2>CLP 컨테이너 로딩플랜 계산기</h2>
      <p>단일 품목 · 여러 품목 혼적 · 파렛트 적재의 최대 적재량과 3D 배치를 계산합니다.</p>
      <span class="go">열기 →</span>
    </a>
    <a class="tile" href="margin.html">
      <div class="ico">⚓</div>
      <h2>신항 vs 북항 수입 마진 비교 계산기</h2>
      <p>청구단가·환율·물량·원가를 입력해 신항/북항 마진을 나란히 비교합니다. 오늘자 매매기준율 자동 조회.</p>
      <span class="go">열기 →</span>
    </a>
  </div>
</main>
<footer>© 물류 계산기 · 실제 적용 시 화물 특성·규정·시세를 확인하세요.</footer>
</body>
</html>
